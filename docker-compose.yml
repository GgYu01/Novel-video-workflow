version: "3.9"

services:
  av-api:
    build:
      context: .
      dockerfile: ./build/Dockerfile.api
      args:
        PYTHON_BASE_IMAGE: ${AV_WORKFLOW_PYTHON_BASE_IMAGE:-python:3.12-slim}
    image: av-workflow-api:${AV_WORKFLOW_IMAGE_TAG:-latest}
    env_file:
      - ./.env
      - ./.env.secrets
    restart: unless-stopped
    environment:
      PYTHONPATH: /app/src
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./runtime:/app/runtime
    expose:
      - "${AV_WORKFLOW_API_PORT:-8080}"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          python -c "import os, urllib.request;
          urllib.request.urlopen(
          'http://127.0.0.1:%s/health' % os.environ.get('AV_WORKFLOW_API_PORT', '8080'),
          timeout=3
          )"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=infra_gateway_net"
      - "traefik.http.routers.av-workflow.rule=Host(`${AV_WORKFLOW_PUBLIC_HOST}`)"
      - "traefik.http.routers.av-workflow.entrypoints=websecure"
      - "traefik.http.routers.av-workflow.tls=true"
      - "traefik.http.services.av-workflow.loadbalancer.server.port=${AV_WORKFLOW_API_PORT:-8080}"
    networks:
      - av_workflow_net
      - infra_gateway_net

networks:
  av_workflow_net:
    driver: bridge
  infra_gateway_net:
    external: true
